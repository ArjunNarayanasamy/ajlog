{{ define "main" }}
<section>
  <h1>{{ .Title }}</h1>
  <p class="section-desc">{{ len .Pages }} {{ if eq (len .Pages) 1 }}post{{ else }}posts{{ end }}</p>
  <div class="list">
    {{ range .Pages }}
    <div class="list-item">
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      <time>{{ .Date.Format "2006-01-02" }}</time>
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
