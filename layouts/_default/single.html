{{ define "main" }}
<article>
  <header class="article-header">
    <h1>{{ .Title }}</h1>
    <div class="article-meta">
      <time>{{ .Date.Format "January 2, 2006" }}</time>
      {{ with .Params.tags }}
      <div class="tags">
        {{ range . }}<a href="/tags/{{ . | urlize }}/" class="tag">{{ . }}</a>{{ end }}
      </div>
      {{ end }}
    </div>
  </header>
  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
